<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DASCOLA | NIS Vessel Real-Time Tracker</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #07121d;
      --panel: #102233;
      --ink: #e6f4ff;
      --accent: #54b5ff;
      --ok: #57d08f;
      --warn: #ffd166;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(120deg, #0d1c2a, #0e2f48);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      font-size: 1.15rem;
      margin: 0;
      letter-spacing: .02em;
    }

    .title-wrap p {
      margin: .3rem 0 0;
      color: #b8d4ea;
      font-size: 0.9rem;
    }

    .status {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: .4rem .7rem;
      font-size: .82rem;
      color: #d6ebfb;
    }

    .status.ok { border-color: rgba(87,208,143,.6); color: var(--ok); }
    .status.warn { border-color: rgba(255,209,102,.6); color: var(--warn); }
    .status.danger { border-color: rgba(255,107,107,.6); color: var(--danger); }

    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 0;
    }

    aside {
      border-right: 1px solid rgba(255,255,255,0.12);
      background: var(--panel);
      padding: 1rem;
      overflow: auto;
    }

    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: .85rem;
      margin-bottom: .85rem;
    }

    .panel h2 {
      margin: 0 0 .5rem;
      font-size: .95rem;
    }

    .controls {
      display: grid;
      gap: .55rem;
    }

    label { font-size: .8rem; color: #bfd6e8; }

    input, select, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #0d1925;
      color: var(--ink);
      padding: .52rem .62rem;
      font: inherit;
    }

    button {
      cursor: pointer;
      background: #134565;
      border-color: #2e6a90;
      transition: transform .15s ease;
    }

    button:hover { transform: translateY(-1px); }

    #map { height: 100%; width: 100%; }

    #vessel-list {
      display: grid;
      gap: .5rem;
      max-height: 46vh;
      overflow: auto;
    }

    .vessel-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: .55rem;
      font-size: .83rem;
    }

    .muted { color: #a9c5d8; font-size: .78rem; }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      aside { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.12); }
      #vessel-list { max-height: 30vh; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <h1>DASCOLA FleetPulse (NIS / AIS)</h1>
      <p>Real-time vessel map with provider adapters and live polling.</p>
    </div>
    <div id="sync-state" class="status warn">Connecting…</div>
  </header>

  <main>
    <aside>
      <section class="panel">
        <h2>Connection</h2>
        <div class="controls">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="demo">Demo stream (works now)</option>
            <option value="customNis">Custom NIS endpoint</option>
          </select>

          <label for="endpoint">NIS endpoint URL</label>
          <input id="endpoint" placeholder="https://example.com/nis/vessels" />

          <label for="token">Bearer/API token (optional)</label>
          <input id="token" placeholder="Paste token" />

          <label for="interval">Refresh seconds</label>
          <input id="interval" type="number" value="20" min="5" max="300" />

          <button id="apply">Apply & Refresh</button>
        </div>
      </section>

      <section class="panel">
        <h2>Fleet Snapshot</h2>
        <div id="summary" class="muted">Waiting for first update…</div>
      </section>

      <section class="panel">
        <h2>Tracked Vessels</h2>
        <div id="vessel-list"></div>
      </section>
    </aside>

    <section id="map" aria-label="Vessel position map"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const appConfig = {
      provider: 'demo',
      endpoint: '',
      token: '',
      refreshSeconds: 20,
      ...window.NIS_CONFIG
    };

    const stateEl = document.getElementById('sync-state');
    const summaryEl = document.getElementById('summary');
    const vesselListEl = document.getElementById('vessel-list');

    const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markersByMmsi = new Map();
    let pollHandle;

    function setStatus(kind, text) {
      stateEl.className = `status ${kind}`;
      stateEl.textContent = text;
    }

    class DemoProvider {
      async fetchVessels() {
        const t = Date.now() / 10000;
        return [
          { mmsi: '219000111', name: 'NIS Atlas', lat: 57.70 + Math.sin(t) * 0.5, lon: 11.95 + Math.cos(t) * 0.8, sog: 14.2, cog: 241 },
          { mmsi: '219000222', name: 'NIS Borealis', lat: 35.89 + Math.sin(t * 0.8) * 0.9, lon: -5.31 + Math.cos(t * 0.8) * 0.7, sog: 12.8, cog: 88 },
          { mmsi: '219000333', name: 'NIS Emergent', lat: 1.26 + Math.sin(t * 1.1) * 0.7, lon: 103.84 + Math.cos(t * 1.1) * 0.6, sog: 16.9, cog: 45 }
        ];
      }
    }

    class CustomNisProvider {
      constructor({ endpoint, token }) {
        this.endpoint = endpoint;
        this.token = token;
      }

      async fetchVessels() {
        if (!this.endpoint) throw new Error('Add a NIS endpoint URL first.');

        const headers = { 'Accept': 'application/json' };
        if (this.token) headers.Authorization = `Bearer ${this.token}`;

        const response = await fetch(this.endpoint, { headers });
        if (!response.ok) throw new Error(`NIS API error: HTTP ${response.status}`);

        const payload = await response.json();
        return normalizeVessels(payload);
      }
    }

    function normalizeVessels(payload) {
      const rows = Array.isArray(payload) ? payload : payload.vessels || payload.data || [];
      return rows
        .map(v => ({
          mmsi: String(v.mmsi ?? v.MMSI ?? ''),
          name: v.name ?? v.vesselName ?? 'Unknown vessel',
          lat: Number(v.lat ?? v.latitude),
          lon: Number(v.lon ?? v.lng ?? v.longitude),
          sog: Number(v.sog ?? v.speed ?? 0),
          cog: Number(v.cog ?? v.course ?? 0),
          updatedAt: v.updatedAt ?? v.timestamp ?? new Date().toISOString()
        }))
        .filter(v => v.mmsi && Number.isFinite(v.lat) && Number.isFinite(v.lon));
    }

    function getProvider() {
      if (appConfig.provider === 'customNis') {
        return new CustomNisProvider(appConfig);
      }
      return new DemoProvider();
    }

    function renderVessels(vessels) {
      const active = new Set();
      vessels.forEach(v => {
        active.add(v.mmsi);
        let marker = markersByMmsi.get(v.mmsi);
        if (!marker) {
          marker = L.marker([v.lat, v.lon]).addTo(map);
          markersByMmsi.set(v.mmsi, marker);
        } else {
          marker.setLatLng([v.lat, v.lon]);
        }

        marker.bindPopup(`
          <strong>${v.name}</strong><br>
          MMSI: ${v.mmsi}<br>
          SOG: ${v.sog.toFixed(1)} kn<br>
          COG: ${v.cog.toFixed(0)}°
        `);
      });

      for (const [mmsi, marker] of markersByMmsi.entries()) {
        if (!active.has(mmsi)) {
          map.removeLayer(marker);
          markersByMmsi.delete(mmsi);
        }
      }

      summaryEl.textContent = `${vessels.length} vessel(s) online • Last sync ${new Date().toLocaleTimeString()}`;
      vesselListEl.innerHTML = vessels.map(v => `
        <article class="vessel-item">
          <strong>${v.name}</strong><br>
          MMSI ${v.mmsi}<br>
          <span class="muted">${v.lat.toFixed(3)}, ${v.lon.toFixed(3)} • ${v.sog.toFixed(1)} kn</span>
        </article>
      `).join('') || '<span class="muted">No vessels in current feed.</span>';
    }

    async function syncNow() {
      const provider = getProvider();
      setStatus('warn', 'Syncing…');
      try {
        const vessels = await provider.fetchVessels();
        renderVessels(vessels);
        setStatus('ok', `Live • ${new Date().toLocaleTimeString()}`);
      } catch (error) {
        setStatus('danger', error.message);
      }
    }

    function applySettings() {
      appConfig.provider = document.getElementById('provider').value;
      appConfig.endpoint = document.getElementById('endpoint').value.trim();
      appConfig.token = document.getElementById('token').value.trim();
      appConfig.refreshSeconds = Math.max(5, Number(document.getElementById('interval').value) || 20);

      clearInterval(pollHandle);
      syncNow();
      pollHandle = setInterval(syncNow, appConfig.refreshSeconds * 1000);
    }

    document.getElementById('apply').addEventListener('click', applySettings);

    document.getElementById('provider').value = appConfig.provider;
    document.getElementById('endpoint').value = appConfig.endpoint;
    document.getElementById('token').value = appConfig.token;
    document.getElementById('interval').value = appConfig.refreshSeconds;

    applySettings();
  </script>
</body>
</html>
