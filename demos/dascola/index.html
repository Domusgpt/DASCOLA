<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D'Ascola Seafood Fleet Map — Santos, Brazil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050B12;
      color: #F0EBE0;
      font-family: 'Josefin Sans', sans-serif;
    }
    .da-hero {
      text-align: center;
      padding: 3rem 2rem 1rem;
    }
    .da-hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      color: #C9A84C;
      letter-spacing: 0.08em;
    }
    .da-hero .subtitle {
      font-weight: 200;
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8BAFC4;
      opacity: 0.7;
    }
    .da-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
      margin: 1.5rem auto;
      opacity: 0.3;
    }
    footer {
      text-align: center;
      padding: 2rem;
      font-weight: 200;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #F0EBE0;
      opacity: 0.2;
    }
  </style>
</head>
<body>

  <header class="da-hero">
    <h1>D'Ascola Seafood</h1>
    <div class="subtitle">Est. 1893 &middot; Santos, Brazil</div>
    <div class="da-divider"></div>
  </header>

  <section class="fleet-section" id="fleet">
    <div class="fleet-map-wrap">
      <div class="fleet-map-panel-wrap">
        <aside class="fleet-roster" id="fleetRoster">
          <div class="fleet-roster-title">FLEET ROSTER</div>
          <div id="rosterList"></div>
        </aside>
        <div class="fleet-map" id="fleetMap">
          <canvas id="fleetCanvasDepth"></canvas>
          <canvas id="fleetCanvasCurrents"></canvas>
          <canvas id="fleetCanvasCoast"></canvas>
          <canvas id="fleetCanvasVessels"></canvas>
          <canvas id="fleetCanvasAtmo"></canvas>
          <div class="vessel-info" id="vesselInfo">
            <h4 id="viName"></h4>
            <p id="viDetail"></p>
            <span class="vi-status" id="viStatus"></span>
          </div>
        </div>
      </div>
      <div class="fleet-legend">
        <div class="fleet-legend-item"><span class="fleet-legend-dot dot-vessel"></span> Vessel</div>
        <div class="fleet-legend-item"><span class="fleet-legend-dot dot-port"></span> Port</div>
        <div class="fleet-legend-item"><span class="fleet-legend-dot dot-route"></span> Shipping Route</div>
        <div class="fleet-legend-item"><span class="fleet-legend-dot dot-fishing"></span> Active Fishing Zone</div>
      </div>
      <div class="fleet-stats">
        <div class="fleet-stat"><div class="fleet-stat-n fleet-stat-0">7</div><div class="fleet-stat-l">Vessels</div></div>
        <div class="fleet-stat"><div class="fleet-stat-n fleet-stat-1">4</div><div class="fleet-stat-l">Fishing</div></div>
        <div class="fleet-stat"><div class="fleet-stat-n fleet-stat-2">1</div><div class="fleet-stat-l">In Transit</div></div>
        <div class="fleet-stat"><div class="fleet-stat-n fleet-stat-3">1</div><div class="fleet-stat-l">In Port</div></div>
        <div class="fleet-stat"><div class="fleet-stat-n fleet-stat-4">1</div><div class="fleet-stat-l">Returning</div></div>
      </div>
    </div>
  </section>

  <footer>D'Ascola Seafood &middot; Santos, SP, Brazil</footer>

  <script type="module">
    import { FleetMap } from '../../src/index.js';

    var map = new FleetMap('#fleetMap', {
      title: "D'Ascola Seafood",
      subtitle: 'Est. 1893 · Santos, Brazil',
      bounds: { latN: -15, latS: -35, lonW: -55, lonE: -25 },
      vessels: [
        { name: 'São Jorge',      mmsi: null, lat: -24.2, lon: -44.8, heading: 135, speed: 7.2, type: 'Longliner',  status: 'Fishing',    catch: 'Swordfish' },
        { name: 'Estrela do Mar',  mmsi: null, lat: -25.1, lon: -45.5, heading: 200, speed: 5.8, type: 'Trawler',    status: 'In Transit', catch: 'Tuna' },
        { name: 'Rei do Oceano',   mmsi: null, lat: -23.5, lon: -43.2, heading: 45,  speed: 0,   type: 'Longliner',  status: 'In Port',    catch: '\u2014' },
        { name: 'Brisa Dourada',   mmsi: null, lat: -26.3, lon: -47.0, heading: 320, speed: 8.1, type: 'Longliner',  status: 'Fishing',    catch: 'Yellowtail' },
        { name: 'Maré Alta',       mmsi: null, lat: -22.8, lon: -41.5, heading: 180, speed: 6.5, type: 'Gillnetter', status: 'Fishing',    catch: 'Snapper' },
        { name: "D'Ascola I",      mmsi: null, lat: -24.0, lon: -46.2, heading: 90,  speed: 3.2, type: 'Longliner',  status: 'Returning',  catch: 'Swordfish' },
        { name: 'Esperança',       mmsi: null, lat: -27.5, lon: -46.8, heading: 350, speed: 9.0, type: 'Trawler',    status: 'Fishing',    catch: 'Tuna' },
      ],
      ports: [
        { name: 'Santos',         lat: -23.96, lon: -46.33, size: 'major' },
        { name: 'Rio de Janeiro',  lat: -22.91, lon: -43.17, size: 'minor' },
        { name: 'Florianópolis',   lat: -27.59, lon: -48.55, size: 'minor' },
        { name: 'Vitória',         lat: -20.32, lon: -40.34, size: 'minor' },
        { name: 'Paranaguá',       lat: -25.52, lon: -48.51, size: 'minor' },
        { name: 'Salvador',        lat: -12.97, lon: -38.51, size: 'minor' },
      ],
      routes: [
        { name: 'U.S. East Coast', points: [[-23.96,-46.33],[-22,-42],[-18,-38],[-12,-35],[-5,-32],[5,-40],[15,-50],[25,-60],[35,-68],[40,-73],[40.7,-74]] }
      ],
    });

    map.start();
  </script>

</body>
</html>
